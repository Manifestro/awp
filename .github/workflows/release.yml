name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [linux, darwin]
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build archive
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          version="${GITHUB_REF_NAME#v}"
          archive="awp_${version}_${GOOS}_${GOARCH}.tar.gz"
          go build -trimpath -ldflags "-s -w -X github.com/Manifestro/awp/internal/cli.Version=${version}" -o awp ./cmd/awp
          tar -czf "${archive}" awp
      - uses: actions/upload-artifact@v4
        with:
          name: awp-${{ matrix.os }}-${{ matrix.arch }}
          path: awp_*.tar.gz
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: awp-*
          path: dist
          merge-multiple: true
      - name: Create checksums
        working-directory: dist
        run: |
          version="${GITHUB_REF_NAME#v}"
          sha256sum awp_*.tar.gz > "awp_${version}_checksums.txt"
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --repo "$GITHUB_REPOSITORY" --generate-notes --verify-tag
